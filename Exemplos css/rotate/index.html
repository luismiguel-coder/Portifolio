<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotate Element</title>   
    <style>
      
      * { margin: 0; padding: 0; box-sizing: border-box; }

        img{
            width: 500px;
            height: 450px;
            transition: transform 0.3s ease; /* Adiciona uma transição suave */
            justify-content: center;
            border-radius: 50%;
        }
        img:hover {
            transform: rotate(360deg); /* Gira a imagem 360 graus ao passar o mouse */
            /*transform: scale(1.2); /* aumenta o tamanho da imagem em 20% ao passar o mouse */
        }
    </style>
</head>
<body>
    <img src="pokemon.png" alt="Pokemon">
    <p>Pokemon</p>
</body>
</html>
