<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aumentar Elemento</title>
</head>
<body>
    <button>AUMENTAR</button>
    <style>
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: royalblue;
            color: white;
            border: none;
            cursor: pointer;
           /* transition: transform 0.3s ease; /* Adiciona uma transição suave */
        }

        button:hover {
            transform: scale(1.2); /* Aumenta o tamanho do botão em 20% ao passar o mouse */
        }
    </style>
</body>
</html>
