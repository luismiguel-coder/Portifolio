<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo responsivo</title>
</head>
<body>
    <div class="container">
        <h1>Exemplo de Layout Responsivo</h1>
        <p>Este é um exemplo de layout responsivo usando HTML e CSS. O layout se ajusta automaticamente para diferentes 
            tamanhos de tela, garantindo uma boa experiência de usuário em dispositivos móveis, tablets e desktops.</p>    
           
            <div class="card">HTML</div>
            <div class="card">CSS</div>
            <div class="card">JavaScript</div>
    </div>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        
    .container {
            display: flex;
            gap: 20px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background-color: royalblue;
            color: white;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #ccc;
            padding: 20px;
            margin: 10px;
            text-align: center;
        }

    
        @media (max-width: 768px) {
            .container {
                padding: 10px;
                flex-direction: column;
                align-items: center;
            }

            .card {
                padding: 15px;
                margin: 5px;
            }
        }
    
        @media (min-width: 769px) and (max-width: 1024px) {
            .container {
                padding: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .card {
                padding: 18px;
                margin: 8px;
            }
        }
    </style>
</body>
</html>
