<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Grid Responsivo</title>
    
    <style>
        .container {
            display: grid;
            grid-template-columns:1fr 1fr;

            /*com repeat
            grid-template-columns: repeat(4, 1fr);
            4 quantidade de coluna e 1f é o tamanho da coluna (de cada coluna)
            */    

            padding:20px;
            color: red;
            gap : 20px
        }

        .back {
            background-color: black;
            /*margin:5px;*/
            padding: 5px;
            display:flex;
            border-radius: 10px;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            height: 150x;

        }
    </style>
</head>
<body>
  <div class="container">
   
    <div class="back">1</div>
    <div class="back">2</div>
    <div class="back">3</div>
    <div class="back">4</div>
 </div>
</body>
</html>
